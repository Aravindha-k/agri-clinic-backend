databases:
  - name: agri-clinic-db
    plan: basic-256mb
    databaseName: employee_tracking_o7qr
    user: employee_tracking_o7qr_user

services:
  - type: web
    name: agri-clinic-backend
    runtime: python
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /healthz/
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-clinic-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: APP_ENV
        value: "production"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "agri-clinic-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://agri-clinic-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://agri-clinic-frontend.onrender.com"
