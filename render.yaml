databases:
  - name: agri-clinic-db
    databaseName: employee_tracking_o7qr
    user: employee_tracking_o7qr_user

services:
  - type: web
    name: agri-clinic-backend
    runtime: python
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /healthz/
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-clinic-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
