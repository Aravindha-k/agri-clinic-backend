  /api/v1/audit/logs/:
    get:
      operationId: v1_audit_logs_list
      description: "Full audit trail of system actions. Admin only.  \n\n**Filterable
        by:** `module`, `action`, `actor`, `entity_id`, `date_from`, `date_to`"
      summary: List audit logs (admin)
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: 'Filter by action type: `CREATE`, `UPDATE`, `DELETE`, `LOGIN`,
          `LOGOUT`, `STATUS_CHANGE`, `UPLOAD`.'
      - in: query
        name: actor
        schema:
          type: string
        description: Filter by actor username (substring match).
      - in: query
        name: date_from
        schema:
          type: string
          format: date
        description: 'Start date filter (inclusive). Format: `YYYY-MM-DD`.'
      - in: query
        name: date_to
        schema:
          type: string
          format: date
        description: 'End date filter (inclusive). Format: `YYYY-MM-DD`.'
      - in: query
        name: entity_id
        schema:
          type: string
        description: Filter by exact entity / object ID.
      - in: query
        name: module
        schema:
          type: string
        description: Filter by module name (e.g. `ACCOUNTS`, `VISITS`, `FARMERS`).
      - in: query
        name: page
        schema:
          type: integer
        description: Page number (1-based).
      - in: query
        name: page_size
        schema:
          type: integer
        description: Number of results per page (default 50, max varies).
      tags:
      - Audit Logs
      security:
      - jwtAuth: []
      - cookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/v1/auth/login/:
    post:
