openapi: 3.0.3
info:
  title: Agri Clinic API
  version: 1.0.0
  description: "Production-ready REST API for the Agri Clinic SaaS platform.\n\n##
    Authentication\nAll protected endpoints require a **Bearer JWT** token.  \nObtain
    tokens via `POST /api/v1/auth/login/` then pass:  \n`Authorization: Bearer <access_token>`\n\n##
    Standard Response Envelope\n**Success:** `{ success: true, message: string, data:
    object }`  \n**Error:**   `{ success: false, message: string, errors: object,
    code: string }`\n\n## Pagination\nAll list endpoints return `{ count, next, previous,
    results }` under `data`.\nUse `?page=N&page_size=N` query params."
