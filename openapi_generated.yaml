components:
  schemas:
    ActionEnum:
      enum:
      - CREATE
      - UPDATE
      - DELETE
      - LOGIN
      - LOGOUT
      - STATUS_CHANGE
      - UPLOAD
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `DELETE` - Delete
        * `LOGIN` - Login
        * `LOGOUT` - Logout
        * `STATUS_CHANGE` - Status Change
        * `UPLOAD` - Upload
    ActivityTypeEnum:
      enum:
      - FARMER_CREATED
      - VISIT_COMPLETED
      - ISSUE_REPORTED
      - RECOMMENDATION_GIVEN
      - FOLLOWUP_VISIT
      type: string
      description: |-
        * `FARMER_CREATED` - Farmer Created
        * `VISIT_COMPLETED` - Visit Completed
        * `ISSUE_REPORTED` - Issue Reported
        * `RECOMMENDATION_GIVEN` - Recommendation Given
        * `FOLLOWUP_VISIT` - Follow-up Visit
    AdminCreateEmployeeError:
      type: object
      properties:
        success:
          type: boolean
          default: false
        message:
          type: string
        errors:
          type: object
          additionalProperties: {}
          default: {}
        code:
          type: string
      required:
      - code
      - message
    AdminCreateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
        phone:
          type: string
          minLength: 1
      required:
      - password
      - phone
      - username
    AdminCrop:
