      description: "Authenticate with either `employee_id` + `password` or `username`
        + `password`.  \nReturns JWT `access` and `refresh` tokens plus employee profile."
      summary: Login (employee ID or username)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                employee_id:
                  type: string
                  example: KAC-0001
                username:
                  type: string
                  example: john.doe
                password:
                  type: string
                  example: secret
              required:
              - password
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Login successful. Returns JWT tokens and employee data.
                content:
